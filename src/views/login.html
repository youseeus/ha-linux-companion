<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>HA Linux Companion</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: 'Inter', -apple-system, sans-serif; background: #0d0d0d; color: #fff; display: flex; flex-direction: column; }
    .bg-gradient { position: fixed; inset: 0; background: radial-gradient(ellipse at 30% 40%, rgba(74,144,217,0.06) 0%, transparent 60%), radial-gradient(ellipse at 70% 60%, rgba(74,144,217,0.04) 0%, transparent 60%); pointer-events: none; }
    .main { position: relative; z-index: 1; flex: 1; display: flex; align-items: center; justify-content: center; padding-bottom: 240px; overflow-y: auto; }
    .container { width: 100%; max-width: 400px; padding: 20px; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .header h1 { font-size: 20px; font-weight: 600; }
    .close-btn { width: 36px; height: 36px; background: #2C2C2E; border: none; border-radius: 50%; color: #8E8E93; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
    .close-btn:hover { background: #FF453A; color: #fff; }
    .tabs { display: flex; gap: 4px; margin-bottom: 24px; background: #1C1C1E; border-radius: 10px; padding: 4px; }
    .tab { flex: 1; padding: 10px; background: transparent; border: none; color: #8E8E93; font-size: 13px; font-weight: 500; border-radius: 8px; cursor: pointer; font-family: inherit; transition: all 0.2s; }
    .tab.active { background: #4A90D9; color: #fff; }
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 11px; font-weight: 500; color: #8E8E93; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    .field input { width: 100%; padding: 11px 14px; background: #2C2C2E; border: 1px solid #3A3A3C; border-radius: 8px; color: #fff; font-size: 15px; font-family: inherit; outline: none; transition: border-color 0.2s; }
    .field input:focus { border-color: #4A90D9; }
    .field input::placeholder { color: #636366; }
    .btn { width: 100%; padding: 13px; background: linear-gradient(135deg, #4A90D9, #357ABD); color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; font-family: inherit; cursor: pointer; transition: opacity 0.2s; }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .status { text-align: center; margin-top: 12px; font-size: 13px; min-height: 18px; }
    .status.error { color: #FF453A; }
    .status.success { color: #30D158; }
    .status.loading { color: #8E8E93; }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #8E8E93; border-top-color: #4A90D9; border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 500; align-items: center; justify-content: center; }
    .overlay.show { display: flex; }
    .overlay-card { background: #1C1C1E; border-radius: 16px; padding: 32px; max-width: 360px; width: 90%; }
    .overlay-card h2 { font-size: 18px; margin-bottom: 8px; }
    .overlay-card p { color: #8E8E93; font-size: 13px; margin-bottom: 20px; }
    #keyboard { position: fixed; bottom: 0; left: 0; right: 0; background: #1C1C1E; border-top: 1px solid #3A3A3C; padding: 4px 3px; z-index: 1000; display: none; touch-action: manipulation; }
    #keyboard.visible { display: block; }
    .kb-row { display: flex; justify-content: center; gap: 3px; margin: 2px 0; }
    .kb-key { flex: 1; max-width: 44px; height: 44px; background: #2C2C2E; color: #fff; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; user-select: none; -webkit-user-select: none; touch-action: manipulation; display: flex; align-items: center; justify-content: center; transition: background 0.08s; }
    .kb-key:active { background: #4A90D9; }
    .kb-space { flex: 4; max-width: none; font-size: 14px; }
    .kb-shift { flex: 1.3; max-width: 56px; background: #3A3A3C; }
    .kb-back { flex: 1.3; max-width: 56px; background: #3A3A3C; }
    .kb-enter { flex: 1.3; max-width: 56px; background: #4A90D9; }
    .kb-close { flex: 0.8; max-width: 44px; background: #3A3A3C; font-size: 14px; }
    .kb-left, .kb-right { flex: 0.7; max-width: 40px; background: #3A3A3C; font-size: 18px; }
    .kb-sym { flex: 1; max-width: 32px; font-size: 14px; background: #363638; }
    .kb-page { display: none; }
    .kb-page.active { display: block; }
    .kb-bar { display: flex; gap: 3px; margin: 3px 0 1px; padding-top: 3px; border-top: 1px solid #2C2C2E; }
    .kb-bar .kb-b { height: 46px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; display: flex; align-items: center; justify-content: center; user-select: none; -webkit-user-select: none; touch-action: manipulation; }
    .kb-b.sym-btn { flex: 1.2; background: #2C2C2E; color: #fff; }
    .kb-b.sym-btn.active { background: #4A90D9; }
    .kb-b.caps-btn { flex: 1; background: #3A3A3C; color: #8E8E93; font-size: 16px; }
    .kb-b.caps-btn.active { background: #4A90D9; color: #fff; }
    .kb-b.url-btn { flex: 1.4; background: #363638; color: #8E8E93; font-size: 11px; }
    .kb-b.dot-btn { flex: 0.5; background: #363638; color: #fff; font-size: 18px; font-weight: bold; }
    .kb-b.arr-btn { flex: 0.5; background: #3A3A3C; color: #fff; font-size: 16px; }
    .kb-b.space-btn { flex: 3; background: #2C2C2E; color: #fff; font-size: 13px; }
    .kb-b.enter-btn { flex: 1; background: #4A90D9; color: #fff; }
    .kb-b.close-btn { flex: 0.5; background: #3A3A3C; color: #8E8E93; font-size: 14px; }
    .kb-b:active { opacity: 0.7; }
  </style>
</head>
<body>
  <div class="bg-gradient"></div>
  <div class="main">
    <div class="container">
      <div class="header">
        <h1>HA Linux Companion</h1>
        <button class="close-btn" id="closeBtn" title="Quit">✕</button>
      </div>
      <div class="tabs">
        <button class="tab active" data-tab="login" onclick="switchTab('login')">Login</button>
        <button class="tab" data-tab="token" onclick="switchTab('token')">Token</button>
      </div>
      <div id="loginTab">
        <div class="field"><label>Home Assistant URL</label><input type="url" id="loginUrl" placeholder="https://homeassistant.local:8123" spellcheck="false" autocomplete="off"></div>
        <div class="field"><label>Username</label><input type="text" id="loginUser" placeholder="admin" autocomplete="off"></div>
        <div class="field"><label>Password</label><div style="position:relative"><input type="password" id="loginPass" placeholder="Your password" autocomplete="off" style="padding-right:44px"><button onclick="togglePass()" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:#8E8E93;font-size:18px;cursor:pointer;padding:4px" id="eyeBtn">👁</button></div></div>
        <div class="field"><label>Device Name</label><input type="text" id="loginDeviceName" placeholder="living-room-panel" autocomplete="off"></div>
        <button class="btn" id="loginBtn" onclick="doLogin()">Sign In</button>
      </div>
      <div id="tokenTab" style="display:none">
        <div class="field"><label>Home Assistant URL</label><input type="url" id="tokenUrl" placeholder="https://homeassistant.local:8123" spellcheck="false" autocomplete="off"></div>
        <div class="field"><label>Long-Lived Access Token</label><input type="text" id="tokenToken" placeholder="Paste token from HA Profile → Security" autocomplete="off"></div>
        <div class="field"><label>Device Name</label><input type="text" id="tokenName" placeholder="living-room-panel" autocomplete="off"></div>
        <button class="btn" id="tokenBtn" onclick="doTokenConnect()">Connect</button>
      </div>
      <div class="status" id="status"></div>
    </div>
  </div>
  <div class="overlay" id="mfaOverlay">
    <div class="overlay-card">
      <h2>Two-Factor Authentication</h2>
      <p>Enter the code from your authenticator app.</p>
      <div class="field"><input type="text" id="mfaCode" placeholder="000000" autocomplete="off" maxlength="6" inputmode="numeric"></div>
      <button class="btn" onclick="doMfaSubmit()">Verify</button>
      <button class="btn" style="background:#2C2C2E;margin-top:8px" onclick="closeMfa()">Cancel</button>
    </div>
  </div>
  <div id="keyboard">
    <div class="kb-page active" id="kbPage1">
      <div class="kb-row"><button class="kb-key" data-k="1">1</button><button class="kb-key" data-k="2">2</button><button class="kb-key" data-k="3">3</button><button class="kb-key" data-k="4">4</button><button class="kb-key" data-k="5">5</button><button class="kb-key" data-k="6">6</button><button class="kb-key" data-k="7">7</button><button class="kb-key" data-k="8">8</button><button class="kb-key" data-k="9">9</button><button class="kb-key" data-k="0">0</button></div>
      <div class="kb-row"><button class="kb-key" data-k="q">q</button><button class="kb-key" data-k="w">w</button><button class="kb-key" data-k="e">e</button><button class="kb-key" data-k="r">r</button><button class="kb-key" data-k="t">t</button><button class="kb-key" data-k="y">y</button><button class="kb-key" data-k="u">u</button><button class="kb-key" data-k="i">i</button><button class="kb-key" data-k="o">o</button><button class="kb-key" data-k="p">p</button></div>
      <div class="kb-row"><button class="kb-key" data-k="a">a</button><button class="kb-key" data-k="s">s</button><button class="kb-key" data-k="d">d</button><button class="kb-key" data-k="f">f</button><button class="kb-key" data-k="g">g</button><button class="kb-key" data-k="h">h</button><button class="kb-key" data-k="j">j</button><button class="kb-key" data-k="k">k</button><button class="kb-key" data-k="l">l</button></div>
      <div class="kb-row"><button class="kb-key kb-shift" data-special="shift">⇧</button><button class="kb-key" data-k="z">z</button><button class="kb-key" data-k="x">x</button><button class="kb-key" data-k="c">c</button><button class="kb-key" data-k="v">v</button><button class="kb-key" data-k="b">b</button><button class="kb-key" data-k="n">n</button><button class="kb-key" data-k="m">m</button><button class="kb-key" data-k="_">_</button><button class="kb-key" data-k="-">-</button><button class="kb-key kb-back" data-special="back">⌫</button></div>
    </div>
    <div class="kb-page" id="kbPage2">
      <div class="kb-row"><button class="kb-key kb-sym" data-k="1">1</button><button class="kb-key kb-sym" data-k="2">2</button><button class="kb-key kb-sym" data-k="3">3</button><button class="kb-key kb-sym" data-k="4">4</button><button class="kb-key kb-sym" data-k="5">5</button><button class="kb-key kb-sym" data-k="6">6</button><button class="kb-key kb-sym" data-k="7">7</button><button class="kb-key kb-sym" data-k="8">8</button><button class="kb-key kb-sym" data-k="9">9</button><button class="kb-key kb-sym" data-k="0">0</button></div>
      <div class="kb-row"><button class="kb-key kb-sym" data-k="(">(</button><button class="kb-key kb-sym" data-k=")">)</button><button class="kb-key kb-sym" data-k="[">[</button><button class="kb-key kb-sym" data-k="]">]</button><button class="kb-key kb-sym" data-k="{">{</button><button class="kb-key kb-sym" data-k="}">}</button><button class="kb-key kb-sym" data-k="<">&lt;</button><button class="kb-key kb-sym" data-k=">">&gt;</button><button class="kb-key kb-sym" data-k=":">:</button><button class="kb-key kb-sym" data-k=";">;</button><button class="kb-key kb-sym" data-k="'">'</button><button class="kb-key kb-sym" data-k="&quot;">"</button></div>
      <div class="kb-row"><button class="kb-key kb-sym" data-k="!">!</button><button class="kb-key kb-sym" data-k="@">@</button><button class="kb-key kb-sym" data-k="#">#</button><button class="kb-key kb-sym" data-k="$">$</button><button class="kb-key kb-sym" data-k="%">%</button><button class="kb-key kb-sym" data-k="^">^</button><button class="kb-key kb-sym" data-k="&">&amp;</button><button class="kb-key kb-sym" data-k="*">*</button><button class="kb-key kb-sym" data-k="+">+</button><button class="kb-key kb-sym" data-k="=">=</button><button class="kb-key kb-sym" data-k="|">|</button><button class="kb-key kb-sym" data-k="\\">\</button></div>
      <div class="kb-row"><button class="kb-key kb-sym" data-k="~">~</button><button class="kb-key kb-sym" data-k="`">`</button><button class="kb-key kb-sym" data-k="?">?</button><button class="kb-key kb-sym" data-k=",">,</button><button class="kb-key kb-sym" data-k=".">.</button><button class="kb-key kb-sym" data-k="/">/</button><button class="kb-key kb-sym" data-k="_">_</button><button class="kb-key kb-sym" data-k="-">-</button><button class="kb-key kb-sym" data-k="@">@</button><button class="kb-key kb-sym" data-k=":">:</button><button class="kb-key kb-back" data-special="back">⌫</button></div>
    </div>
    <div class="kb-bar">
      <button class="kb-b sym-btn" id="symToggle" data-special="sym">#+=</button>
      <button class="kb-b caps-btn" id="capsBtn" data-special="caps">⇪</button>
      <button class="kb-b url-btn" data-k="https://">https://</button>
      <button class="kb-b dot-btn" data-k=".">.</button>
      <button class="kb-b dot-btn" data-k=":">:</button>
      <button class="kb-b arr-btn" data-special="left">◄</button>
      <button class="kb-b arr-btn" data-special="right">►</button>
      <button class="kb-b space-btn" data-special="space">spazio</button>
      <button class="kb-b enter-btn" data-special="enter">↵</button>
      <button class="kb-b close-btn" data-special="close">▼</button>
    </div>
  </div>
  <script>
    let activeInput = null, shifted = false, capsOn = false, pendingAuth = null, symbolsPage = false;
    function refreshLetterCase() { const u = shifted || capsOn; document.querySelectorAll('#kbPage1 .kb-key[data-k]').forEach(b => { const k = b.dataset.k; if (k.length === 1 && /[a-z]/i.test(k)) b.textContent = u ? k.toUpperCase() : k.toLowerCase(); }); }
    function switchTab(tab) { document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab)); document.getElementById('loginTab').style.display = tab === 'login' ? 'block' : 'none'; document.getElementById('tokenTab').style.display = tab === 'token' ? 'block' : 'none'; setStatus(''); }
    function setStatus(msg, type = '') { const el = document.getElementById('status'); el.className = 'status ' + type; el.innerHTML = msg; }
    async function doLogin() {
      const url = document.getElementById('loginUrl').value.trim(), user = document.getElementById('loginUser').value.trim(), pass = document.getElementById('loginPass').value, deviceName = document.getElementById('loginDeviceName').value.trim() || undefined;
      if (!url || !user || !pass) { setStatus('URL, username and password are required', 'error'); return; }
      document.getElementById('loginBtn').disabled = true; setStatus('<span class="spinner"></span> Signing in...', 'loading');
      try {
        const result = await window.haCompanion.loginWithCredentials({ url, username: user, password: pass, deviceName });
        if (result.mfa_required) { pendingAuth = { url, flowId: result.flow_id, flowType: result.flow_type, deviceName }; document.getElementById('mfaOverlay').classList.add('show'); document.getElementById('mfaCode').value = ''; setTimeout(() => document.getElementById('mfaCode').focus(), 100); setStatus('2FA required', ''); }
        else if (result.success) setStatus('✓ Connected!', 'success');
        else setStatus(result.error || 'Login failed', 'error');
      } catch (err) { setStatus(err.message, 'error'); }
      document.getElementById('loginBtn').disabled = false;
    }
    async function doMfaSubmit() { const code = document.getElementById('mfaCode').value.trim(); if (!code || !pendingAuth) return; setStatus('<span class="spinner"></span> Verifying...', 'loading'); const result = await window.haCompanion.submitMfa({ ...pendingAuth, mfaCode: code }); if (result.success) { closeMfa(); setStatus('✓ Connected!', 'success'); } else setStatus(result.error || 'Invalid code', 'error'); }
    function closeMfa() { document.getElementById('mfaOverlay').classList.remove('show'); pendingAuth = null; }
    async function doTokenConnect() {
      const url = document.getElementById('tokenUrl').value.trim(), token = document.getElementById('tokenToken').value.trim(), name = document.getElementById('tokenName').value.trim() || undefined;
      if (!url || !token) { setStatus('URL and token are required', 'error'); return; }
      document.getElementById('tokenBtn').disabled = true; setStatus('<span class="spinner"></span> Connecting...', 'loading');
      const result = await window.haCompanion.connect({ url, token, deviceName: name });
      if (result.success) setStatus('✓ Connected' + (result.registered ? ' & device registered!' : '!'), 'success');
      else setStatus(result.error || 'Connection failed', 'error');
      document.getElementById('tokenBtn').disabled = false;
    }
    document.getElementById('closeBtn').addEventListener('click', () => window.haCompanion.quit());
    function togglePass() { const inp = document.getElementById('loginPass'), btn = document.getElementById('eyeBtn'); if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🔒'; } else { inp.type = 'password'; btn.textContent = '👁'; } }
    document.addEventListener('keydown', (e) => { if (e.key === 'Enter') document.getElementById('loginTab').style.display !== 'none' ? doLogin() : doTokenConnect(); });
    const kb = document.getElementById('keyboard');
    kb.querySelectorAll('button').forEach(btn => { btn.addEventListener('mousedown', e => e.preventDefault()); btn.addEventListener('touchstart', e => { e.preventDefault(); handleButton(btn); }, { passive: false }); btn.addEventListener('click', e => { e.preventDefault(); handleButton(btn); }); });
    function handleButton(btn) { const key = btn.dataset.k, special = btn.dataset.special; if (special) return handleSpecial(special); if (key) return typeChar(key); }
    function typeChar(ch) { if (!activeInput) return; if (shifted && ch.length === 1 && /[a-z]/.test(ch)) ch = ch.toUpperCase(); if (capsOn && ch.length === 1 && /[a-z]/i.test(ch)) ch = ch.toUpperCase(); const s = activeInput.selectionStart || activeInput.value.length, e = activeInput.selectionEnd || s, v = activeInput.value; activeInput.value = v.slice(0, s) + ch + v.slice(e); activeInput.selectionStart = activeInput.selectionEnd = s + ch.length; activeInput.dispatchEvent(new Event('input', { bubbles: true })); if (shifted && ch.length === 1 && /[a-z]/i.test(ch)) { shifted = false; refreshLetterCase(); } }
    function handleSpecial(s) {
      switch (s) {
        case 'shift': shifted = !shifted; refreshLetterCase(); break;
        case 'caps': capsOn = !capsOn; document.getElementById('capsBtn').classList.toggle('active', capsOn); refreshLetterCase(); break;
        case 'back': if (activeInput) { const s = activeInput.selectionStart || activeInput.value.length, e = activeInput.selectionEnd || s; if (s > 0 || s !== e) { const del = s === e ? 1 : 0, v = activeInput.value; activeInput.value = v.slice(0, s - del) + v.slice(e); activeInput.selectionStart = activeInput.selectionEnd = s - del; activeInput.dispatchEvent(new Event('input', { bubbles: true })); } } break;
        case 'space': typeChar(' '); break;
        case 'enter': document.getElementById('loginTab').style.display !== 'none' ? doLogin() : doTokenConnect(); break;
        case 'close': kb.classList.remove('visible'); break;
        case 'left': if (activeInput) { const s = activeInput.selectionStart || 0; if (s > 0) activeInput.selectionStart = activeInput.selectionEnd = s - 1; } break;
        case 'right': if (activeInput) { const s = activeInput.selectionStart || 0; if (s < activeInput.value.length) activeInput.selectionStart = activeInput.selectionEnd = s + 1; } break;
        case 'sym': symbolsPage = !symbolsPage; document.getElementById('kbPage1').classList.toggle('active', !symbolsPage); document.getElementById('kbPage2').classList.toggle('active', symbolsPage); document.getElementById('symToggle').classList.toggle('active', symbolsPage); document.getElementById('symToggle').textContent = symbolsPage ? 'ABC' : '#+= '; break;
      }
    }
    document.querySelectorAll('input').forEach(input => { input.addEventListener('focus', () => { activeInput = input; kb.classList.add('visible'); setTimeout(() => input.scrollIntoView({ block: 'center', behavior: 'smooth' }), 150); }); });
    kb.addEventListener('mousedown', e => e.preventDefault());
    document.addEventListener('focusin', (e) => { if (e.target.tagName === 'INPUT') { activeInput = e.target; kb.classList.add('visible'); } });
    window.haCompanion.getVersion().then(v => { const d = document.createElement('div'); d.style.cssText = 'text-align:center;margin-top:12px;font-size:11px;color:#636366'; d.textContent = 'v' + v; document.querySelector('.container').appendChild(d); });
  </script>
</body>
</html>
